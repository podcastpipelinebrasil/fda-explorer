<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fda-explorer</title>

    <!-- RDKit.js — carregado direto, antes do app -->
    <script src="https://unpkg.com/@rdkit/rdkit@2025.3.4-1.0.0/dist/RDKit_minimal.js"></script>
    <script>
      window.initRDKitModule({
        locateFile: function () {
          return "https://unpkg.com/@rdkit/rdkit@2025.3.4-1.0.0/dist/RDKit_minimal.wasm";
        }
      }).then(function (RDKit) {
        window.RDKit = RDKit;
        console.log("RDKit carregado:", RDKit.version());
      }).catch(function (e) {
        console.error("Falha ao carregar RDKit:", e);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
